<h1>&#128266; Detect an Asteroid by Ear</h1>
<p>An asteroid is a dot that <b>moves</b> across the frames. In <b>each</b> frame, hover to find the moving object by ear, then <b>click right on it to lock</b> (on a phone: drag to scan, lift your finger to lock). Follow the <b>same</b> object through all 4 frames.</p>
<button id="start" class="primary">Click to start listening</button>
<div id="status"></div>
<div id="frameLbl"></div>
<div>

  <button id="next">Next frame &rarr;</button>

const fieldCv=FIELDS.map(src=>{const c=document.createElement('canvas');c.width=W;c.height=H;
  const im=new Image();im.onload=()=>c.getContext('2d',{willReadFrequently:true}).drawImage(im,0,0,W,H);im.src="data:image/png;base64,"+src;return c;});
const sky=document.getElementById('sky'), ov=document.getElementById('ov'), octx=ov.getContext('2d');
const bar=document.getElementById('bar'), status=document.getElementById('status'), frameLbl=document.getElementById('frameLbl'), result=document.getElementById('result');
let cf=0, locks=new Array(NF).fill(null), cursor=null, target=0, cur=0, ac,osc,gain,started=false;
const COLORS=['#ff5c5c','#5ee0a0','#ffd24d','#8ec5ff'];

function showFrame(){
  sky.src="data:image/jpeg;base64,"+FRAMES[cf];
  frameLbl.textContent="Frame "+(cf+1)+" / "+NF+(locks[cf]?"  (locked \u2713)":"");
  draw();
}
function draw(){
  octx.clearRect(0,0,W,H);
  locks.forEach((L,i)=>{ if(!L)return;
    octx.strokeStyle=COLORS[i%4]; octx.lineWidth=2; octx.beginPath(); octx.arc(L.x,L.y,10,0,7); octx.stroke();
    octx.fillStyle=COLORS[i%4]; octx.font='12px sans-serif'; octx.fillText('F'+(i+1),L.x+12,L.y+4);
  });
  if(cursor){octx.strokeStyle='#fff';octx.globalAlpha=.7;octx.beginPath();octx.arc(cursor.x,cursor.y,12,0,7);octx.stroke();octx.globalAlpha=1;}
}
function toXY(e){const r=sky.getBoundingClientRect();return {x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};}
function scan(e){
  const p=toXY(e);
  if(p.x<0||p.x>W||p.y<0||p.y>H){target=0;return;}
  cursor=p;
  const cv=fieldCv[cf]; if(cv.width) target=cv.getContext('2d',{willReadFrequently:true}).getImageData(Math.floor(p.x),Math.floor(p.y),1,1).data[0]/255;
  draw();
}
function lockHere(){
  if(!cursor)return;
  locks[cf]={x:cursor.x,y:cursor.y};
  status.textContent='Locked frame '+(cf+1)+'!  ('+locks.filter(Boolean).length+' / '+NF+' done)';
  if(cf<NF-1){cf++;showFrame();} else showFrame();
}
sky.addEventListener('pointermove',scan);
sky.addEventListener('pointerdown',e=>{scan(e);});      // start scanning on touch
sky.addEventListener('pointerup',e=>{scan(e);lockHere();}); // click / lift = lock
sky.addEventListener('pointerleave',()=>{target=0;});

document.getElementById('start').onclick=function(){
  if(started)return; started=true;
  ac=new (window.AudioContext||window.webkitAudioContext)();
  osc=ac.createOscillator();gain=ac.createGain();osc.type='sine';osc.frequency.value=220;gain.gain.value=0;
  osc.connect(gain);gain.connect(ac.destination);osc.start();
  this.textContent='Listening'; this.disabled=true; showFrame(); loop();
};
document.getElementById('prev').onclick=()=>{cf=(cf-1+NF)%NF;showFrame();};
document.getElementById('next').onclick=()=>{cf=(cf+1)%NF;showFrame();};
document.getElementById('reset').onclick=()=>{locks=new Array(NF).fill(null);cf=0;result.innerHTML='';showFrame();status.textContent='';};

document.getElementById('reveal').onclick=()=>{
  if(locks.filter(Boolean).length<NF){result.innerHTML='<span class="bad">Lock a spot in all '+NF+' frames first (click on the object in each).</span>';return;}
  let html='<b>Your results:</b><br>', astCount={}, moved=0, prev=null;
  locks.forEach((L,f)=>{
    let best=1e9,bestAst=-1;
    TRUTH.forEach((ast,ai)=>{const p=ast[f];const dd=Math.hypot(L.x-p[0],L.y-p[1]);if(dd<best){best=dd;bestAst=ai;}});
    astCount[bestAst]=(astCount[bestAst]||0)+1;
    const cls=best<20?'good':best<48?'mid':'bad', word=best<20?'spot on!':best<48?'close':'off';
    html+='Frame '+(f+1)+': <span class="'+cls+'">'+Math.round(best)+' px away &mdash; '+word+'</span><br>';
    if(prev)moved+=Math.hypot(L.x-prev.x,L.y-prev.y); prev=L;
  });
  const topAst=Object.entries(astCount).sort((a,b)=>b[1]-a[1])[0], followed=parseInt(topAst[1])===NF;
  html+='<br>';
  if(followed && moved>25) html+='<span class="good">&#10003; You followed one object across all 4 frames, and it MOVED '+Math.round(moved)+' px. That\'s an asteroid &mdash; you detected it by ear!</span>';
  else if(!followed) html+='<span class="mid">You locked different objects in different frames. Try again, following the SAME moving dot through all 4.</span>';
  else html+='<span class="mid">Your locks barely moved &mdash; that looks like a fixed star, not an asteroid.</span>';
  const ai=parseInt(topAst[0]);
  octx.strokeStyle='#5ee0a0';octx.lineWidth=2;octx.setLineDash([5,4]);octx.beginPath();
  TRUTH[ai].forEach((p,i)=>{i?octx.lineTo(p[0],p[1]):octx.moveTo(p[0],p[1]);});octx.stroke();octx.setLineDash([]);
  result.innerHTML=html+'<br><span style="color:#5ee0a0">green dashed line = the object\'s true path</span>';
};

function loop(){requestAnimationFrame(loop);
  cur+=(target-cur)*0.25;
  const t=ac.currentTime,pr=2+cur*10,pulse=0.65+0.35*Math.sin(t*pr*6.28);
  gain.gain.setTargetAtTime(cur*cur*0.35*(cur>0.05?pulse:1),t,0.03);
  osc.frequency.setTargetAtTime(220+cur*660,t,0.03);
  bar.style.width=(cur*100)+'%';
  status.textContent=cur>0.85?'&#128308; on the object!':cur>0.4?'warmer&hellip;':cur>0.12?'faint&hellip;':status.textContent;
}
